packages:
  - path: "gesitr/internal/compendium/models"
    output_path: "web/src/app/generated/models.ts"
    type_mappings:
      "time.Time": "string"
      "gorm.DeletedAt": "string | null"
    exclude_files:
      - "exercise_entity.go"
      - "equipment_entity.go"
      - "fulfillment_entity.go"
      - "exercise_relationship_entity.go"
      - "exercise_group_entity.go"
      - "exercise_group_member_entity.go"
      - "history.go"
  - path: "gesitr/internal/user/models"
    output_path: "web/src/app/generated/user-models.ts"
    type_mappings:
      "time.Time": "string"
      "gorm.DeletedAt": "string | null"
    exclude_files:
      - "user_exercise_entity.go"
      - "user_equipment_entity.go"
      - "user_exercise_scheme_entity.go"
      - "workout_entity.go"
      - "workout_section_entity.go"
      - "workout_section_exercise_entity.go"
      - "workout_log_entity.go"
      - "workout_log_section_entity.go"
      - "workout_log_exercise_entity.go"
      - "workout_log_exercise_set_entity.go"
      - "user_record_entity.go"
